---
layout: default
---
<article class="post">
  <header class="post-header">
    <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d %B %Y" }}</time>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.tags %}
    <div class="post-tags">
      {% for tag in page.tags %}
      <a href="{% link tags.md %}#{{ tag }}" class="tag">{{ tag }}</a>
      {% endfor %}
    </div>
    {% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <footer class="post-footer">
    {% if page.previous %}
    <a href="{{ page.previous.url | relative_url }}" class="post-nav prev">&larr; {{ page.previous.title }}</a>
    {% endif %}
    {% if page.next %}
    <a href="{{ page.next.url | relative_url }}" class="post-nav next">{{ page.next.title }} &rarr;</a>
    {% endif %}
  </footer>
</article>
