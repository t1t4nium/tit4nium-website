<footer class="footer">
  <div class="footer-inner">
    <p class="footer-copy">
      {% assign nav_pages = site.pages | where_exp: "p", "p.nav_order" | sort: "nav_order" %}
      {% for p in nav_pages %}
      <a href="{{ p.url | relative_url }}">{{ p.nav_title }}</a>{% unless forloop.last %} - {% endunless %}
      {% endfor %}
      - <a href="{{ site.feed.path | relative_url }}">rss</a>
    </p>
    <p class="footer-colophon">
      Built with <a href="https://jekyllrb.com" target="_blank">Jekyll</a>
      &middot; <a href="https://github.com/{{ site.github.username }}/{{ site.name }}-website" target="_blank">source</a>
    </p>
  </div>
</footer>
